<!DOCTYPE html>

<body>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: blue;
}

/* Header */
.header {
  text-align: center;
  background: linear-gradient(to bottom, #002a8f, #0055ff);
  padding: 30px 20px;
  color: white;
}

.header img {
  width: 120px;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 36px;
  letter-spacing: 2px;
  margin-bottom: 5px;
}

.header p {
  font-size: 24px;
}

/* Navigation Bar */
.navbar {
  background-color: #0d1440;
  overflow: hidden;
}

.navbar a {
  float: left;
  display: block;
  color: #f2f2f2;
  text-align: center;
  padding: 12px 16px;
  text-decoration: none;
}

.navbar a:hover {
  background-color: #ddd;
  color: black;
}

.content {
  background: linear-gradient(to bottom, #e6f3ff, skyblue); /* PVMCO color */
  margin: 20px auto;
  padding: 25px;
  border-radius: 15px;
  max-width: 900px;
  color: black;
}

/* Section Titles */
.content h2 {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 15px;
}

.content h3 {
  font-size: 22px;
  font-weight: bold;
  margin-top: 15px;
  margin-bottom: 10px;
}

/* Paragraph Text */
.content p {
  text-align: justify;
  line-height: 1.6;
  margin-bottom: 10px;
}

/* Footer */
.footer {
  background: #0d1440;
  color: white;
  text-align: center;
  padding: 15px;
  margin-top: 20px;
}

/* Responsive */
@media screen and (max-width: 800px) {
  .content {
    margin: 10px;
    padding: 15px;
  }
  .navbar a {
    float: none;
    width: 100%;
  }
}

/* Outer Container */
.wrapper {
    margin: 30px;
    background: #cfe3f5;
    padding: 20px;
    border-radius: 8px;
}

/* Scrollable Gallery */
.gallery {
    display: flex;
    gap: 20px;
    overflow-x: auto;
    padding-bottom: 10px;
}

/* Custom Scrollbar */
.gallery::-webkit-scrollbar {
    height: 10px;
}
.gallery::-webkit-scrollbar-track {
    background: #d3d3d3;
    border-radius: 10px;
}
.gallery::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 10px;
}

/* Image Card */
.card {
    flex: 0 0 350px;
    border-radius: 15px;
    overflow: hidden;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.card img {
    width: 100%;
    height: 500px;
    object-fit: cover;
    display: block;
}
</style>
</head>
