<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> VIDEO GALLERY OF STEM </title>
</head>
<body>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background: blue;
}

/* Header */
.header {
  text-align: center;
  background: linear-gradient(to bottom, #002a8f, #0055ff);
  padding: 30px 20px;
  color: white;
}

.header img {
  width: 120px;
  margin-bottom: 10px;
}

.header h1 {
  font-size: 36px;
  letter-spacing: 2px;
  margin-bottom: 5px;
}

.header p {
  font-size: 24px;
}

/* Navigation Bar */
.navbar {
  background-color: #0d1440;
  overflow: hidden;
}

.navbar a {
  float: left;
  display: block;
  color: #f2f2f2;
  text-align: center;
  padding: 12px 16px;
  text-decoration: none;
}

.navbar a:hover {
  background-color: #ddd;
  color: black;
}

.content {
  background: linear-gradient(to bottom, #e6f3ff, skyblue); /* PVMCO color */
  margin: 20px auto;
  padding: 25px;
  border-radius: 15px;
  max-width: 900px;
  color: black;
}

/* Section Titles */
.content h2 {
  font-size: 28px;
  font-weight: bold;
  margin-bottom: 15px;
}

.content h3 {
  font-size: 22px;
  font-weight: bold;
  margin-top: 15px;
  margin-bottom: 10px;
}

/* Paragraph Text */
.content p {
  text-align: justify;
  line-height: 1.6;
  margin-bottom: 10px;
}

/* Footer */
.footer {
  background: #0d1440;
  color: white;
  text-align: center;
  padding: 15px;
  margin-top: 20px;
}

/* Responsive */
@media screen and (max-width: 800px) {
  .content {
    margin: 10px;
    padding: 15px;
  }
  .navbar a {
    float: none;
    width: 100%;
  }
}

.right-video {
    float: right;
}

.video-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.video-grid video {
  width: 50%;
}


</style>
</head>

<body>

<!-- Header -->
<div class="header">
  <img src="STEM.png" alt="Stem Logo">
  <h1> SCIENCE, TECHNOLOGY, ENGINEERING, AND MATHEMATICS </h1>
  <p> STEM </p>
</div>

<!-- Navigation Bar -->
<div class="navbar">
  <a href="index.html">MAIN PAGE</a>
  <a href="aboutstem.html">ABOUT STEM</a>
  <a href="imagegallery.html">IMAGE GALLERY</a>
  <a href="videogallery.html">VIDEO GALLERY</a>
  <a href="puzzle.html" style="float:right">GAMES</a>
</div>

<div class="video-grid">
  <video src="STEM 1.mp4" controls></video>
  <video src="STEM 2.mp4" controls></video>
  <video src="STEM 3.mp4" controls></video>
  <video src="STEM 4.mp4" controls></video>
  <video src="STEM 5.mp4" controls></video>
  <video src="STEM 6.mp4" controls></video>
  <video src="STEM 7.mp4" controls></video>
  <video src="STEM 8.mp4" controls></video>

</div>


  <!-- Footer -->
<div class="footer">
  <p>© 2026 Laguna College of Business and Arts</p>
</div>

</body>
</html>
